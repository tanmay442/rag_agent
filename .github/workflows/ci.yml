name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One job, fast feedback. Order matches the developer mental
# model: cheapest static checks first, then the heavier
# integration build + e2e.
jobs:
  ci:
    name: Build / Lint / Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AI_STUDIO_KEY: ${{ secrets.AI_STUDIO_KEY }}
      CUSTOM_LLM_API_KEY: ${{ secrets.CUSTOM_LLM_API_KEY }}
      CUSTOM_LLM_BASE_URL: ${{ secrets.CUSTOM_LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store path
        id: pnpm-store
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- 1. Typecheck -------------------------------------------------
      - name: Typecheck
        run: pnpm typecheck

      # ---- 2. Lint -------------------------------------------------------
      - name: Lint
        run: pnpm lint

      # ---- 3. Unit + integration tests ----------------------------------
      - name: Unit & integration tests
        run: pnpm test

      # ---- 4. Production build ------------------------------------------
      - name: Build
        run: pnpm build
        env:
          # The build doesn't actually need these (the runtime
          # fetches them on first request) but the env-validation
          # step in next.config fails if they're missing.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ---- 5. E2E (DISABLED) -----------------------------------------
      # TODO :) The e2e step is currently disabled. It provisions a
      # per-run Neon branch, runs vitest + playwright, and tears the
      # branch down on exit, but the setup is flaky in CI:
      #   - Neon REST API: 423 "project already has running conflicting
      #     operations" races between branch-create and endpoint-create.
      #   - `scripts/fixtures/sample.pdf` is a corrupted test PDF that
      #     makes the seed step fail with "bad XRef entry".
      #   - The free-plan branches limit (10) can fill up after a few
      #     failed runs, locking out further CI invocations until the
      #     user manually prunes branches in the Neon console.
      # Re-enable by uncommenting the block below and adding the
      # listed secrets to the repo's GitHub Actions secrets.
